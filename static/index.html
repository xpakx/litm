<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LitM</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- TODO: change to custom svgs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <style>
        :root {
            --bg-color: #2c3e50;
            --accent: #3498db;
            --win-bg: #ecf0f1;
            --header-bg: #876c59;
            --header-text: #e8e2d5;

            --card-bg: #f2ead6;
            --text-dark: #332d28;
            --text-muted: #73675a;
            --line-color: rgba(160, 140, 110, 0.25);
            --highlight-yellow: #f4d674;
            --highlight-peach: #eebf9d;
            --highlight-blue: #a3c9c7;
            --border-color: #7b6a5a;

	    --tab-accent: #dcd3c1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            background-image: radial-gradient(#3a536b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .app-window {
            position: absolute;
            background-color: var(--card-bg);
            border-radius: 4px;
            box-shadow: 
                0 10px 25px rgba(0,0,0,0.15),
                inset 0 0 20px rgba(150, 130, 100, 0.1);
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-width: 200px;
            min-height: 100px;
            user-select: none;
            transition: transform 0.1s;
            overflow: hidden;
	    overscroll-behavior: contain;
        }

        .app-header {
            background: var(--header-bg);
            color: var(--header-text);
            font-family: 'Cinzel', serif;
            padding: 8px 12px;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2.5px;
            font-weight: 600;
            border-bottom: 2px solid #5a4638;
        }

        .app-header:active {
            cursor: grabbing;
            background: var(--accent);
        }

        .app-controls button {
            background: #e74c3c;
            border: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 5px;
        }

        .app-body {
            flex: 1;
            overflow: auto;
            color: #333;
            font-size: 14px;
            position: relative;
        }


        .app-panel-container {
		position: absolute;
		inset: 0;
		display: flex;
		flex-direction: column;
		z-index: 0;
	}

        .app-tab-bar {
		display: flex;
		background: var(--card-bg);
		border-bottom: 1px solid var(--tab-accent);
		overflow-x: auto;
	}

        .app-tab-button {
            padding: 8px 15px;
	    cursor: pointer;
	    background: transparent;
	    color: #aaa;
            border: none;
	    border-right: 1px solid var(--tab-accent);
	    font-size: 12px;
	    font-weight: bold;
	    white-space: nowrap;
	    outline: none;
        }

        .app-tab-button:hover {
		color: #fff;
		background: rgba(255,255,255,0.05);
	}

        .app-tab-button.active {
		background: var(--highlight-blue);
		color: #fff;
		border-bottom: 2px solid var(--accent);
	}

        .app-panel-content {
		flex: 1;
		position: relative;
		overflow: hidden;
	}

        .app-tab-pane {
		position: absolute;
		inset: 0;
		display: none;
		overflow: auto;
		background: var(--highlight-blue);
	}

        .app-tab-pane.active {
		display: block;
	}

        .wf-zone.drag-over::after {
		content: '';
		position: absolute;
		inset: 0;
		background: rgba(0, 122, 204, 0.15);
		border: 2px dashed var(--highlight-peach);
		z-index: 2;
		pointer-events: none;
        }

	#toast-container {
		position: fixed;
		bottom: 40px;
		right: 40px;
		width: 320px;
		z-index: 9999;
	}

	.toast-wrapper {
		position: absolute;
		bottom: 0;
		right: 0;
		width: 100%;
		transform: translateY(calc(var(--index, 0) * -16px)) scale(calc(1 - var(--index, 0) * 0.05));
		z-index: calc(9999 - var(--index, 0));
		transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
		cursor: pointer;
	}

	.toast-wrapper::after {
		content: '';
		position: absolute;
		top: 100%;
		left: 0;
		width: 100%;
		height: 30px;
	}

	#toast-container:hover .toast-wrapper {
		transform: translateY(calc(var(--index, 0) * -95px)) scale(1);
	}

	.toast {
		background: var(--card-bg);
		border: 1px solid black;
		padding: 16px;
		border-radius: 12px;
		width: 100%;
		display: flex;
		gap: 12px;
		align-items: center;
		box-shadow: 0 10px 30px rgba(0,0,0,0.5);
		animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
		position: relative;
		transition: border-color 0.2s ease, background 0.2s ease;
	}

	.toast:hover {
		background: #ffdddd;
		border-color: rgba(255,255,255,0.1);
	}

	.toast.urgent {
		border-color: rgba(214, 122, 122, 0.4);
		box-shadow: 0 10px 30px rgba(214, 122, 122, 0.1);
	}
	.toast.urgent .toast-user {
		color: red;
	}

	.toast-content {
		flex: 1;
		padding-right: 15px;
	}
	.toast-user {
		font-size: 0.85rem;
		display: block;
		margin-bottom: 2px;
	}
	.toast-msg { 
		font-size: 0.8rem;
		line-height: 1.4;
	}

	@keyframes slideIn {
		from { transform: translateX(120%); opacity: 0; }
		to { transform: translateX(0); opacity: 1; }
	}

	@keyframes slideOut {
		to { transform: translateX(120%); opacity: 0; }
	}

	.toast.hide { animation: slideOut 0.4s ease forwards; }



    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="index.js"></script>
    <div id='toast-container'></div>
</body>
</html>
