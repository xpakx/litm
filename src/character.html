<style>

#theme-card {
	height: 100%;
	box-sizing: border-box;
	position: relative;
	flex-grow: 1;
	padding: 15px 20px 25px;
	background-color: var(--card-bg);
	background-image: repeating-linear-gradient(
		transparent, 
		transparent 33px, 
		var(--line-color) 33px, 
		var(--line-color) 34px
	);
	background-position: 0 10px;
}

.character-theme {

	h4 {
		margin: 0 0 5px 0;
		color: #cdd6f4;
	}

	.theme-content {
		display: flex; 
		flex-wrap: wrap;
		gap: 5px;
	}
}

.label-text {
	font-family: 'Cinzel', serif;
	color: #8c8072;
	font-size: 10px;
	letter-spacing: 1.5px;
	font-weight: 600;
}

.handwritten {
	font-family: 'Caveat', cursive;
	color: var(--text-dark);
}

.type-row {
	display: flex;
	align-items: baseline;
	justify-content: center;
	gap: 12px;
	margin-bottom: 12px;
}

.type-row .handwritten {
	font-size: 26px;
	letter-spacing: 0.5px;
}

.item-row {
	display: flex;
	align-items: center;
	margin-bottom: 6px;
	position: relative;
}

.item-main {
	font-size: 30px;
	font-weight: 700;
	margin-left: -5px;
}

.item-sub {
	font-size: 24px;
	margin-left: 20px;
	font-weight: 600;
}

.item-weakness {
	margin-left: 5px;
	font-size: 24px;
	margin-top: 5px;
}

.weakness-icon {
	color: #c09d84;
	font-size: 12px;
	margin-right: 8px;
	margin-top: 5px;
}

.marker-yellow, .marker-peach {
	position: relative;
	display: inline-block;
	padding: 0 6px;
	z-index: 1;
}

.marker-yellow::before, .marker-peach::before {
	content: '';
	position: absolute;
	top: 15%;
	bottom: 10%;
	left: 0;
	right: 0;
	z-index: -1;
	border-radius: 3px 8px 4px 6px / 5px 3px 8px 4px; 
	opacity: 0.9;
}

.marker-yellow::before {
	background-color: var(--highlight-yellow);
	transform: skewX(-4deg) rotate(-0.5deg);
}

.marker-peach::before {
	background-color: var(--highlight-peach);
	transform: skewX(-2deg) rotate(0.5deg);
}

.scratch-icon {
	width: 24px;
	height: 24px;
	margin-left: 5px;
	margin-top: 5px;
	opacity: 0.7;
}

.section-divider {
	height: 1.5px;
	background-color: rgba(0,0,0,0.08);
	margin: 18px 0 12px 0;
}

.quest-header {
	text-align: center;
	margin-bottom: 4px;
	color: #725946;
}

.quest-text {
	font-size: 26px;
	line-height: 1.1;
	margin-bottom: 25px;
	text-align: center;
	padding: 0 10px;
}

.tracking-section {
	display: flex;
	justify-content: center;
	gap: 25px;
	margin-bottom: 15px;
}

.tracking-column {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 4px;
}

.pip-container {
	display: flex;
	gap: 4px;
}

.hexagon-pip {
	width: 14px;
	height: 16px;
	fill: #faf6ef;
	stroke: #877766;
	stroke-width: 1.5;
	stroke-linejoin: round;
}

.tag-btn.selected {
	color: gray;
}

</style>


<div id="theme-card">
	<div class="type-row">
		<span class="label-text">TYPE</span>
		<span class="handwritten" id="theme-type">Origin</span>
	</div>

	<!-- Main Features -->
	<div id="items">

	</div>


	<div class="section-divider"></div>

	<div class="quest-header label-text">QUEST</div>
	<div class="quest-text handwritten" id="quest-content">Example quest</div>

	<div class="tracking-section">

		<div class="tracking-column">
			<div class="pip-container">
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
			</div>
			<span class="label-text" style="font-size: 8px;">ABANDON</span>
		</div>

		<div class="tracking-column">
			<div class="pip-container">
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
			</div>
			<span class="label-text" style="font-size: 8px;">IMPROVE</span>
		</div>

		<div class="tracking-column">
			<div class="pip-container">
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
				<svg class="hexagon-pip" viewBox="0 0 14 16"><polygon points="7,1 13,4 13,12 7,15 1,12 1,4" /></svg>
			</div>
			<span class="label-text" style="font-size: 8px;">MILESTONE</span>
		</div>

	</div>

</div>
